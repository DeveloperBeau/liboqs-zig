name: main
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month
  workflow_dispatch:

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The monthly schedule is an idle-repo safety net. If main saw a commit in the
  # past week, the push-to-main run already exercised every gate, so the
  # scheduled run is redundant and skips. Pushes and manual dispatch always run.
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          last="$(git log -1 --format=%ct HEAD)"
          age_days=$(( ( $(date +%s) - last ) / 86400 ))
          echo "last commit to main: ${age_days} day(s) ago"
          if [ "$age_days" -ge 7 ]; then
            echo "idle for a week; running the safety-net suite"
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "recent activity; skipping (push runs already covered it)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    name: build/fmt/test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig.zon') }}
      - run: zig fmt --check src tests harness build.zig
      - run: zig build
      - run: zig build test

  parity:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    name: parity (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig.zon') }}
      - run: zig build parity

  snapshot:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    name: snapshot (macOS reference)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-macos-latest-${{ hashFiles('build.zig.zon') }}
      - run: zig build snapshot
