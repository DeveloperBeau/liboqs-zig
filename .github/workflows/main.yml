name: main
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: build/fmt/test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig.zon') }}
      - run: zig fmt --check src tests harness build.zig
      - run: zig build
      - run: zig build test

  parity:
    name: parity (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig.zon') }}
      - run: zig build parity

  snapshot:
    name: snapshot (macOS reference)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-macos-latest-${{ hashFiles('build.zig.zon') }}
      - run: zig build snapshot
