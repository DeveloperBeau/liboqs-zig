name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: build/fmt/test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-${{ matrix.os }}-${{ hashFiles('build.zig.zon') }}
      - run: zig fmt --check src tests harness build.zig
      - run: zig build
      - run: zig build test

  parity:
    name: parity (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/cache@v5
        with:
          path: ~/.cache/zig
          key: zig-ubuntu-latest-${{ hashFiles('build.zig.zon') }}
      - run: zig build parity
